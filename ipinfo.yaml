#!name = 策略组 IP 监控模块
#!desc = 在模块设置中选择策略组，面板将实时显示该组节点的出口 IP。
#!system = ios

# --- 模块设置 UI 生成 ---
env:
  monitor_group:
    title: "目标策略组"
    description: "请输入或选择你配置文件中现有的策略组名称"
    type: string
    default: "Proxy"
    # 如果你想手动指定几个固定选项，可以加上 options: ["Proxy", "Jerry-Nodes", "Final"]

# --- 面板组件配置 ---
widgets:
  - name: "节点 IP 监控"
    title: "策略组状态"
    type: script
    icon: "network"
    script_name: group_ip_tracker
    update_interval: 60

# --- 脚本注册 ---
scriptings:
  - name: group_ip_tracker
    type: generic
    # 这里的 script_url 需替换为你实际存放 JS 脚本的地址
    script_url: "https://raw.githubusercontent.com/user/repo/main/group_ip.js"
