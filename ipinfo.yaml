#!name = 策略监控模块
#!desc = 在模块设置中选择策略组，面板显示对应节点 IP。
#!system = ios

env:
  target_group:
    title: "选择目标策略组"
    description: "请在下方输入框填写你想监控的策略组名称"
    type: string
    default: "Proxy"

widgets:
  - name: "节点 IP 监控"
    title: "策略组 IP"
    type: script
    icon: "network"
    script_name: get_group_ip
    update_interval: 60

scriptings:
  - name: get_group_ip
    type: generic
    script_url: "https://raw.githubusercontent.com/robodev688/egern/refs/heads/main/ipinfo.js"
