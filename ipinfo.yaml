#!name = 策略监控模块
#!desc = 在模块设置中选择策略组，面板显示对应节点 IP。
#!system = ios

env:
  monitor_group_name:
    title: "监控策略组名称"
    description: "请输入策略组名称（如 Proxy）"
    type: string
    default: "Proxy"

widgets:
  - name: "Group IP Monitor"
    title: "节点状态"
    type: script
    icon: "network"
    script_name: get_node_ip
    update_interval: 60

scriptings:
  - name: get_node_ip
    type: generic
    script_url: "https://raw.githubusercontent.com/robodev688/egern/refs/heads/main/group_ip.js"
